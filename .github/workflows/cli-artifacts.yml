name: CLI Artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: cli-artifacts-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux-x64:
    name: Linux x64
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            binutils \
            clang \
            cmake \
            file \
            pkg-config \
            zip

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Read version
        id: version
        shell: bash
        run: |
          read_pubspec_version() {
            awk '/^version:/ { print $2; exit }' "$1" | cut -d'+' -f1
          }

          read_app_version_constant() {
            sed -n "s/^const String kAriamiVersion = '\(.*\)';$/\1/p" \
              ariami_core/lib/app_version.dart
          }

          CLI_VERSION="$(read_pubspec_version ariami_cli/pubspec.yaml)"
          CORE_VERSION="$(read_pubspec_version ariami_core/pubspec.yaml)"
          CONST_VERSION="$(read_app_version_constant)"

          if [ -z "${CLI_VERSION}" ] || [ -z "${CORE_VERSION}" ] || [ -z "${CONST_VERSION}" ]; then
            echo "::error::Could not read Ariami version from pubspec.yaml or app_version.dart"
            exit 1
          fi

          if [ "${CLI_VERSION}" != "${CORE_VERSION}" ] || [ "${CLI_VERSION}" != "${CONST_VERSION}" ]; then
            echo "::error::Ariami version mismatch; fix these before building"
            echo "  ariami_cli/pubspec.yaml:      ${CLI_VERSION}"
            echo "  ariami_core/pubspec.yaml:     ${CORE_VERSION}"
            echo "  ariami_core/app_version.dart: ${CONST_VERSION}"
            exit 1
          fi

          echo "VERSION=${CLI_VERSION}" >> "${GITHUB_ENV}"
          echo "RELEASE_NAME=ariami-cli-linux-x64-v${CLI_VERSION}" >> "${GITHUB_ENV}"
          echo "version=${CLI_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "release_name=ariami-cli-linux-x64-v${CLI_VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Get dependencies
        working-directory: ariami_cli
        run: flutter pub get

      - name: Build web
        working-directory: ariami_cli
        run: flutter build web -t lib/web/main.dart

      - name: Build CLI
        working-directory: ariami_cli
        run: dart build cli -o build/cli-out

      - name: Build Sonic
        working-directory: sonic
        run: cargo build --release --features aac-fdk --lib

      - name: Assemble CLI bundle
        run: |
          rm -rf "${RELEASE_NAME}" "${RELEASE_NAME}.zip"
          mkdir -p "${RELEASE_NAME}/bin" "${RELEASE_NAME}/lib" "${RELEASE_NAME}/web"

          cp ariami_cli/build/cli-out/bundle/bin/ariami_cli "${RELEASE_NAME}/bin/ariami_cli"
          cp -R ariami_cli/build/cli-out/bundle/lib/. "${RELEASE_NAME}/lib/"
          cp -R ariami_cli/build/web/. "${RELEASE_NAME}/web/"
          cp sonic/target/release/libsonic_transcoder.so "${RELEASE_NAME}/lib/libsonic_transcoder.so"
          cp ariami_cli/ariami_cli-launcher.sh "${RELEASE_NAME}/ariami_cli"
          cp ariami_cli/SETUP.txt "${RELEASE_NAME}/SETUP.txt"
          cp ariami_cli/HEADLESS.md "${RELEASE_NAME}/HEADLESS.md"
          chmod +x "${RELEASE_NAME}/ariami_cli" "${RELEASE_NAME}/bin/ariami_cli"

      - name: Verify CLI bundle
        run: |
          test -f "${RELEASE_NAME}/bin/ariami_cli"
          test -f "${RELEASE_NAME}/lib/libsonic_transcoder.so"

          for artifact in "${RELEASE_NAME}/bin/ariami_cli" "${RELEASE_NAME}"/lib/*.so; do
            file "$artifact"
            file "$artifact" | grep -q 'x86-64'
          done

          nm -D "${RELEASE_NAME}/lib/libsonic_transcoder.so" | grep -q 'sonic_ffi_abi_version'

      - name: Smoke test CLI
        run: |
          rm -rf "${RUNNER_TEMP}/ariami-smoke"
          cd "${RELEASE_NAME}"

          version_output="$(ARIAMI_DATA_DIR="${RUNNER_TEMP}/ariami-smoke" ./bin/ariami_cli --version)"
          echo "$version_output"
          if ! grep -Fq "${VERSION}" <<< "$version_output"; then
            echo "::error::CLI --version output did not include ${VERSION}"
            exit 1
          fi

          status_output="$(ARIAMI_DATA_DIR="${RUNNER_TEMP}/ariami-smoke" ./ariami_cli status)"
          echo "$status_output"
          if ! grep -Fq 'Server:    stopped' <<< "$status_output"; then
            echo "::error::CLI status output did not include 'Server:    stopped'"
            exit 1
          fi

      - name: Package CLI artifact
        run: zip -r -q "${RELEASE_NAME}.zip" "${RELEASE_NAME}"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.version.outputs.release_name }}
          path: ${{ steps.version.outputs.release_name }}.zip
          if-no-files-found: error

