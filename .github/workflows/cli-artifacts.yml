          cp ariami_cli/build/cli-out/bundle/bin/ariami_cli "${RELEASE_NAME}/bin/ariami_cli"
          cp -R ariami_cli/build/cli-out/bundle/lib/. "${RELEASE_NAME}/lib/"
          cp -R ariami_cli/build/web/. "${RELEASE_NAME}/web/"
          cp sonic/target/release/libsonic_transcoder.dylib "${RELEASE_NAME}/lib/libsonic_transcoder.dylib"
          cp ariami_cli/ariami_cli-launcher.sh "${RELEASE_NAME}/ariami_cli"
          cp ariami_cli/SETUP.txt "${RELEASE_NAME}/SETUP.txt"
          cp ariami_cli/HEADLESS.md "${RELEASE_NAME}/HEADLESS.md"
          chmod +x "${RELEASE_NAME}/ariami_cli" "${RELEASE_NAME}/bin/ariami_cli"

      - name: Verify CLI bundle
        run: |
          test -f "${RELEASE_NAME}/bin/ariami_cli"
