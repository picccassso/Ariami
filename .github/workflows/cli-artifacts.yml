            lipo "$dylib" -verify_arch arm64
          done

          nm -gU "${RELEASE_NAME}/lib/libsonic_transcoder.dylib" | grep -q '_sonic_ffi_abi_version$'

      - name: Smoke test CLI
        run: |
          rm -rf "${RUNNER_TEMP}/ariami-smoke"
