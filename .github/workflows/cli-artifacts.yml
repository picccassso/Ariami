            exit 1
          fi

      - name: Package CLI artifact
        run: ditto -c -k --sequesterRsrc --keepParent "${RELEASE_NAME}" "${RELEASE_NAME}.zip"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.version.outputs.release_name }}
          path: ${{ steps.version.outputs.release_name }}.zip
          if-no-files-found: error

  windows-x64:
    name: Windows x64
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Read version
        id: version
        shell: bash
        run: |
          read_pubspec_version() {
            awk '/^version:/ { print $2; exit }' "$1" | cut -d'+' -f1
          }

          read_app_version_constant() {
            sed -n "s/^const String kAriamiVersion = '\(.*\)';$/\1/p" \
              ariami_core/lib/app_version.dart
          }

          CLI_VERSION="$(read_pubspec_version ariami_cli/pubspec.yaml)"
          CORE_VERSION="$(read_pubspec_version ariami_core/pubspec.yaml)"
          CONST_VERSION="$(read_app_version_constant)"

          if [ -z "${CLI_VERSION}" ] || [ -z "${CORE_VERSION}" ] || [ -z "${CONST_VERSION}" ]; then
            echo "::error::Could not read Ariami version from pubspec.yaml or app_version.dart"
            exit 1
          fi

          if [ "${CLI_VERSION}" != "${CORE_VERSION}" ] || [ "${CLI_VERSION}" != "${CONST_VERSION}" ]; then
            echo "::error::Ariami version mismatch; fix these before building"
            echo "  ariami_cli/pubspec.yaml:      ${CLI_VERSION}"
            echo "  ariami_core/pubspec.yaml:     ${CORE_VERSION}"
            echo "  ariami_core/app_version.dart: ${CONST_VERSION}"
            exit 1
          fi

          echo "VERSION=${CLI_VERSION}" >> "${GITHUB_ENV}"
          echo "RELEASE_NAME=ariami-cli-windows-x64-v${CLI_VERSION}" >> "${GITHUB_ENV}"
          echo "version=${CLI_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "release_name=ariami-cli-windows-x64-v${CLI_VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Get dependencies
        working-directory: ariami_cli
        run: flutter pub get

      - name: Build web
        working-directory: ariami_cli
        run: flutter build web -t lib/web/main.dart

      - name: Build CLI
        working-directory: ariami_cli
        run: dart build cli -o build/cli-out

      - name: Build Sonic
        working-directory: sonic
        run: cargo build --release --features aac-fdk --lib

      - name: Assemble CLI bundle
        shell: pwsh
        run: |
          $release = $env:RELEASE_NAME
          Remove-Item -Recurse -Force $release, "$release.zip" -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force "$release/bin", "$release/lib", "$release/web" | Out-Null

          Copy-Item 'ariami_cli/build/cli-out/bundle/bin/ariami_cli.exe' "$release/bin/ariami_cli.exe"
          Copy-Item 'ariami_cli/build/cli-out/bundle/lib/*' "$release/lib/" -Recurse
          Copy-Item 'ariami_cli/build/web/*' "$release/web/" -Recurse
          Copy-Item 'sonic/target/release/sonic_transcoder.dll' "$release/lib/sonic_transcoder.dll"
          Copy-Item 'ariami_cli/ariami_cli-launcher.bat' "$release/ariami_cli.bat"
          Copy-Item 'ariami_cli/SETUP.txt' "$release/SETUP.txt"
          Copy-Item 'ariami_cli/HEADLESS.md' "$release/HEADLESS.md"

      - name: Verify CLI bundle
        shell: pwsh
        run: |
          function Assert-X64Pe($path) {
            if (-not (Test-Path $path)) {
              throw "Missing PE file: $path"
            }

            $stream = [System.IO.File]::OpenRead($path)
            $reader = [System.IO.BinaryReader]::new($stream)
            try {
              $stream.Position = 0x3c
              $peOffset = $reader.ReadInt32()
              $stream.Position = $peOffset + 4
              $machine = $reader.ReadUInt16()
              if ($machine -ne 0x8664) {
                throw ('{0} is not x64 (PE machine 0x{1:X4})' -f $path, $machine)
              }
            } finally {
              $reader.Dispose()
              $stream.Dispose()
            }
          }

          $release = $env:RELEASE_NAME
          Assert-X64Pe "$release/bin/ariami_cli.exe"
          Assert-X64Pe "$release/lib/sonic_transcoder.dll"
          Assert-X64Pe "$release/lib/sqlite3.dll"

      - name: Smoke test CLI
        shell: pwsh
        run: |
          $release = $env:RELEASE_NAME
          $env:ARIAMI_DATA_DIR = "$env:RUNNER_TEMP\ariami-smoke"
          Remove-Item -Recurse -Force $env:ARIAMI_DATA_DIR -ErrorAction SilentlyContinue
          Push-Location $release
          try {
            $versionOutput = & .\bin\ariami_cli.exe --version
            $versionExit = $LASTEXITCODE
            $versionOutput
            if ($versionExit -ne 0) {
              throw "CLI --version exited with code $versionExit"
            }
            if (($versionOutput -join "`n") -notlike "*$env:VERSION*") {
              throw "CLI --version output did not include $env:VERSION"
            }

            $statusOutput = & .\ariami_cli.bat status
            $statusExit = $LASTEXITCODE
            $statusOutput
            if ($statusExit -ne 0) {
              throw "CLI status exited with code $statusExit"
            }
            if (($statusOutput -join "`n") -notlike "*Server:    stopped*") {
              throw "CLI status output did not include 'Server:    stopped'"
            }

            # Regression guard: actually start the server (signal handlers,
            # HTTP bind) — watching SIGTERM crashed on Windows once.
            $env:ARIAMI_DATA_DIR = "$env:RUNNER_TEMP\ariami-smoke-server"
            $outLog = "$env:RUNNER_TEMP\server-out.log"
            $errLog = "$env:RUNNER_TEMP\server-err.log"
            $proc = Start-Process -FilePath '.\bin\ariami_cli.exe' `
              -ArgumentList 'start', '--no-browser', '--port', '8090' `
              -RedirectStandardOutput $outLog -RedirectStandardError $errLog `
              -PassThru -NoNewWindow
            $ok = $false
            foreach ($i in 1..30) {
              if ($proc.HasExited) { break }
              try {
                $r = Invoke-WebRequest -Uri 'http://127.0.0.1:8090/api/ping' -UseBasicParsing -TimeoutSec 2
                if ($r.StatusCode -eq 200) { $ok = $true; break }
              } catch {}
              Start-Sleep -Seconds 2
            }
            Get-Content $outLog -ErrorAction SilentlyContinue | Select-Object -First 40
            Get-Content $errLog -ErrorAction SilentlyContinue | Select-Object -First 20
            if (-not $ok) {
              throw "Server did not respond on port 8090 (process exited: $($proc.HasExited))"
            }
            Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
          } finally {
            Pop-Location
          }

      - name: Package CLI artifact
        shell: pwsh
        run: Compress-Archive -Path $env:RELEASE_NAME -DestinationPath "$env:RELEASE_NAME.zip"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.version.outputs.release_name }}
          path: ${{ steps.version.outputs.release_name }}.zip
          if-no-files-found: error
