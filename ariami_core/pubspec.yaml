name: ariami_core
description: Shared core library for Ariami - platform-agnostic services and models
version: 4.0.0
publish_to: 'none'

environment:
  sdk: ^3.5.0

dependencies:
  # HTTP server framework
  shelf: ^1.4.0
  shelf_router: ^1.1.0
  shelf_web_socket: ^3.0.0
  shelf_static: ^1.1.0

  # Music metadata extraction
  dart_tags: ^0.4.1

  # Utilities
  crypto: ^3.0.3
  watcher: ^1.1.0
  path: ^1.8.0

  # Password hashing (pure Dart, for multi-user auth)
  bcrypt: ^1.1.3

  # Logging
  logging: ^1.2.0

  # Catalog persistence (pure Dart SQLite runtime)
  sqlite3: ^2.4.0

dev_dependencies:
  lints: ^6.1.0
  test: ^1.25.0
